      - slug: webhook-watcher-type-advertised-but-rejected
        title: "README advertises `webhook` watchers, but the runtime only accepts `polling` and `file`"
        criterion: FC-1
        surface: "Completeness"
        concern: significant
        locations:
          - path: README.md
            start_line: 289
            end_line: 305
        evidence: |
          Expose data that MCP clients can read and subscribe to:

          ```yaml
          resources:
            - uri: data://queue/pending
              name: Pending Jobs
              description: Current pending job count
              mimeType: application/json
              handler:
                exec: "./scripts/count-pending"
              watcher:
                type: polling
                interval_ms: 5000
                change_detection: hash
          ```

          Watcher types: `polling` (interval + hash), `file` (filesystem watch), `webhook` (HTTP trigger).
        evidence_lang: markdown
        evidence_markers:
          - lines: "17"
            type: del
            label: "README claims `webhook` is supported"
        mechanism: |
          The runtime's watcher validator only accepts `polling` and `file`, so any
          config that follows the README's advertised `webhook` type fails during parse
          time instead of starting a watcher. This is a hard product-contract mismatch,
          not an optional enhancement.
        remediation: |
          Either remove `webhook` from the README immediately or implement it end to end
          by extending the watcher schema, validator, and runtime dispatcher together.
        temporal:
