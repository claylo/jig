boundaries:
  - name: cli_surface
    description: "User-facing CLI that validates, runs, scaffolds, and bundles YAML-defined servers"
    modules: [cli, runtime-index, config]
    notes: "Argument parsing and usage text are the new public entry point added after the previous audit"

  - name: exec_handler
    description: "Handler that spawns child processes from YAML-defined tool handlers"
    modules: [handlers, access]
    notes: "Primary command execution surface; user-authored config controls command, args, env, cwd, and output size policy"

  - name: http_transport_and_fetch
    description: "HTTP transport listener plus outbound HTTP/GraphQL handlers and shared fetch wrapper"
    modules: [transports, handlers, connections, util, access]
    notes: "Covers Streamable HTTP serving, connection header resolution, host allowlists, and request/response size handling"

  - name: filesystem_and_resources
    description: "Resource readers, file watchers, and helper-level path access"
    modules: [resources, access, util]
    notes: "Path traversal and watcher lifecycle issues land here when resource URIs or helper paths derive from config or tool input"

  - name: yaml_config_parsing
    description: "YAML config loading, schema validation, and cross-reference checks"
    modules: [config, tools, prompts, completions, probes, tasks]
    notes: "The config is untrusted author input that defines capabilities, security policy, and runtime behavior"

  - name: jsonlogic_and_templates
    description: "JsonLogic evaluation and Mustache-like rendering used by guards, transforms, prompts, and dispatch"
    modules: [util, handlers, prompts, tasks, probes]
    notes: "High-leverage evaluation surface because expressions can reach env, paths, headers, and response shaping"

  - name: task_state_machine
    description: "Async workflow interpreter, task store adapters, and elicitation flow"
    modules: [tasks, server, runtime-index]
    notes: "Newer runtime surface with asynchronous transitions, status updates, and terminal-result handling"
