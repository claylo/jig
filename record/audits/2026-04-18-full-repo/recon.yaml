boundaries:
  - name: exec_handler
    description: "Handler that spawns child processes via execFile"
    modules: [handlers]
    notes: "Primary shell execution surface — user-controlled command + args via YAML config"

  - name: http_graphql_fetch
    description: "Handlers that perform network requests to user-specified URLs"
    modules: [handlers, fetch]
    notes: "SSRF risk if URL comes from tool arguments without host allowlist enforcement"

  - name: filesystem_access
    description: "Resource handlers that read files and watchers that observe filesystem changes"
    modules: [resources, access, helpers]
    notes: "Path traversal risk if resource URIs or watcher paths are user-controlled"

  - name: yaml_config_parsing
    description: "YAML config loading and validation — the entire server definition is untrusted YAML"
    modules: [config, interpolate]
    notes: "Config defines tools, handlers, security policy — controls what the server can do"

  - name: jsonlogic_evaluation
    description: "JsonLogic rules evaluated at runtime for guards, transforms, dispatch, and interpolation"
    modules: [jsonlogic, helpers, connections, handlers, tasks, probes, interpolate]
    notes: "Custom operators expose env vars, filesystem stat, PATH access — powerful evaluation surface"

  - name: template_rendering
    description: "Mustache-style template rendering with user arguments injected"
    modules: [template, handlers, prompts, tasks]
    notes: "Template injection if argument values contain mustache syntax"

  - name: task_state_machine
    description: "Workflow interpreter that drives multi-step tasks with state transitions"
    modules: [tasks]
    notes: "State machine transitions, elicitation flow, TTL enforcement"
