---
audit_date: 2026-04-18
scope: "Full repo audit — src/runtime (TypeScript MCP server runtime), tests, examples"
commit: d825be6546b4291dba1d8bf85b390b295004e89d
assessment: |
  jig is a 4-day-old TypeScript MCP server runtime (~5.1k LOC, 77 commits) with a
  disciplined architecture: strict TypeScript configuration (noUncheckedIndexedAccess,
  noImplicitReturns, verbatimModuleSyntax), clean module boundaries quarantining the SDK
  behind server.ts, extensive test coverage (18 test files, ~6.9k LOC), and a hand-rolled
  config validator that rejects unknown keys across 12+ config blocks. The exec handler's
  argument injection via whitespace-splitting is the primary security concern — execFile
  prevents shell metacharacters, but space-separated argument injection is fully reachable
  from MCP clients. The workflow subsystem's fire-and-forget promise launch is the primary
  reliability concern — an unhandled rejection crashes the server. The config validator has
  five validation gaps where the YAML author gets silent acceptance instead of the
  loud-failure pattern enforced elsewhere. Code duplication is emerging across handlers but
  is expected at this project age and consolidation is straightforward. The dependency tree
  is minimal (4 production deps) and advisory-free. Overall posture: strong foundation with
  a short remediation list — one security fix and one crash-risk fix are near-term priorities.

narratives:
  - slug: tool-dispatch-boundary
    title: "The Tool Dispatch Boundary"
    thesis: "The dispatch path from MCP tool call to handler execution has one exploitable argument injection and four config validation gaps that silently accept invalid YAML."
    verdict: "The exec handler's whitespace-split argument construction is the most consequential finding in this audit — it creates a real argument injection vector reachable from any MCP client. The four config validation gaps are defense-in-depth issues: they don't create vulnerabilities alone, but they erode the 'typos fail loud' principle that the rest of the validator enforces consistently. The exec injection needs near-term remediation; the validation gaps are straightforward additions following existing patterns in the same file."

