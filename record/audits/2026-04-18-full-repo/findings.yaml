      - id: boot-validation
        label: "Boot-time config validation"
        type: process
        findings:
          - slug: tool-unknown-keys-not-rejected
            label: "Unknown keys pass"
          - slug: input-type-not-validated
            label: "Bad types pass"
          - slug: tool-name-uniqueness-not-enforced
            label: "Dupes accepted"
      - id: parse-args
        label: "Parse JSON-RPC arguments"
        type: process
      - id: is-task-tool
        label: "Task-enabled tool?"
        type: decision
        no: sync-path
      - id: task-resolve
        label: "resolveDispatchCase"
        type: process
        findings:
          - slug: when-guards-skipped-in-task-dispatch-fusion
            label: "Guards skipped"
      - id: exec-handler
        label: "exec: render + split argv"
        type: process
        findings:
