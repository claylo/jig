        title: "@modelcontextprotocol/server pinned to exact alpha pre-release"
        concern: advisory
        locations:
          - path: package.json
            start_line: 16
            end_line: 16
        evidence: |
          "@modelcontextprotocol/server": "2.0.0-alpha.2",
        evidence_markers:
          - lines: "1"
            type: mark
            label: "Exact pin to alpha pre-release"
        mechanism: |
          The MCP server SDK is pinned to exact version 2.0.0-alpha.2 rather than a
          caret/tilde range. Only two alpha releases exist. The exact pin means npm install
          will never pick up patch fixes without a manual edit. The pin is defensible — alpha
          APIs carry inherent breakage risk — but it creates a manual update burden as the
          SDK iterates toward stability.
        remediation: |
          No immediate action. When a stable 2.0.0 ships, switch to "^2.0.0".
        temporal:
          introduced: "2026-04-14"
